server {
    listen 80;
    server_name _;

    # Security headers — applied to every response.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP: SPA only loads from itself; no inline scripts (Vite emits hashed
    # script tags), no external CDN, no eval. `connect-src` covers the
    # /api/* XHR; `style-src 'unsafe-inline'` is required because Svelte
    # 5's scoped styles compile to <style> blocks in the document head.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # SPA static (Vite build output)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Sphinx documentation
    location /docs/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Liveness probe
    location /healthz {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        access_log off;
    }
}
