apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "kex.name" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "kex.labels" . | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.host }}`)
      kind: Rule
      middlewares:
        # Matches the cluster-auth "consumer pattern" — same-namespace
        # references, the Middleware CRs are defined in middleware.yaml.
        - name: oauth2-signin
        - name: oauth2-auth
      services:
        - name: {{ include "kex.name" . }}
          port: 80
