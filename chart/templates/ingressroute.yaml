apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "kex.name" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "kex.labels" . | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.host }}`)
      kind: Rule
      middlewares:
        {{- range .Values.oauthMiddlewares }}
        - name: {{ .name }}
          namespace: {{ .namespace }}
        {{- end }}
      services:
        - name: {{ include "kex.name" . }}
          port: 80
