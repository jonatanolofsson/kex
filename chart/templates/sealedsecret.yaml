{{/* Conditional SealedSecret carrying the ArgoCD account token.

     Renders iff `.Values.argocdToken.sealedValue` is set. The resource
     name matches `.Values.argocdTokenSecretName` so the Deployment's
     `secretKeyRef` in deployment.yaml resolves at pod-start.

     The encrypted blob is namespace + name scoped (`--scope strict`
     when sealing), so re-using it under a different name or namespace
     fails closed. Rotation procedure: see docs/operations.rst. */}}
{{- if and .Values.argocdToken .Values.argocdToken.sealedValue .Values.argocdTokenSecretName -}}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.argocdTokenSecretName }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "kex.labels" . | nindent 4 }}
spec:
  encryptedData:
    token: {{ .Values.argocdToken.sealedValue | quote }}
  template:
    metadata:
      name: {{ .Values.argocdTokenSecretName }}
      namespace: {{ .Release.Namespace }}
    type: Opaque
{{- end -}}
