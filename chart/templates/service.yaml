apiVersion: v1
kind: Service
metadata:
  name: {{ include "kex.name" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "kex.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      name: http
  selector: {{- include "kex.selectorLabels" . | nindent 4 }}
