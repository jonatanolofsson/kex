{{/* UI config ConfigMap. Mounted at /etc/kex/config/ by the
     Deployment; the backend reads ui.json once at startup and serves
     the parsed result on GET /api/config.

     stakater/reloader (annotation on the Deployment) restarts the
     pod when this ConfigMap changes, so an edit to chart values
     propagates without a manual `kubectl rollout restart`. */}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kex.name" . }}-config
  namespace: {{ .Release.Namespace }}
  labels: {{- include "kex.labels" . | nindent 4 }}
data:
  ui.json: |
{{ .Values.ui | default dict | toJson | indent 4 }}
