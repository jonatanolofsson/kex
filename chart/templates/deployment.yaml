{{/* Resolve the CA bundle source: either an inline-rendered ConfigMap
     ({{ release.name }}-ca-bundle) or a pre-existing one named in
     `.Values.caBundle.existingConfigMap`. Empty disables the mount. */}}
{{- $caCM := "" -}}
{{- if .Values.caBundle.content -}}
{{- $caCM = printf "%s-ca-bundle" (include "kex.name" .) -}}
{{- else if .Values.caBundle.existingConfigMap -}}
{{- $caCM = .Values.caBundle.existingConfigMap -}}
{{- end -}}
{{- $caKey := .Values.caBundle.configMapKey | default "ca-bundle.crt" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kex.name" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "kex.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "kex.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "kex.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kex.name" . }}
      containers:
        - name: kex
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          env:
            - name: ARGOCD_SERVER
              value: {{ .Values.argocdServer | quote }}
            {{- if .Values.argocdTokenSecretName }}
            - name: ARGOCD_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.argocdTokenSecretName }}
                  key: {{ .Values.argocdTokenSecretKey }}
            {{- end }}
            {{- if $caCM }}
            - name: KEX_ARGOCD_CA_BUNDLE
              value: /etc/kex/ca/{{ $caKey }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources: {{- toYaml .Values.resources | nindent 12 }}
          {{- if $caCM }}
          volumeMounts:
            - name: ca-bundle
              mountPath: /etc/kex/ca/{{ $caKey }}
              subPath: {{ $caKey }}
              readOnly: true
          {{- end }}
      {{- if $caCM }}
      volumes:
        - name: ca-bundle
          configMap:
            name: {{ $caCM }}
      {{- end }}
