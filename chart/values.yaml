image:
  repository: ghcr.io/jonatanolofsson/kex
  tag: latest
  pullPolicy: Always

# Ingress host (e.g. edgelab.k8sapps.boliden.internal). Override per
# environment.
host: edgelab.k8sapps.boliden.internal

# The chart creates per-namespace Middleware CRs that forward to the
# central cluster-auth oauth2-proxy (see chart/templates/middleware.yaml).
# Set to false to disable the OIDC gate entirely (not recommended).
oauthEnabled: true

# Secret holding the ArgoCD API token. Two pieces:
#   * argocdTokenSecretName — name of the in-cluster Secret the Deployment
#     reads ARGOCD_AUTH_TOKEN from. Leave empty to disable the git column;
#     the page degrades gracefully to "git data unavailable".
#   * argocdToken.sealedValue — encrypted token from `kubeseal --raw …`.
#     The chart materialises a SealedSecret carrying this blob iff both
#     `argocdTokenSecretName` and `argocdToken.sealedValue` are set.
# Rotation procedure: docs/operations.rst.
argocdTokenSecretName: ""
argocdTokenSecretKey: token
argocdToken:
  sealedValue: ""

# ArgoCD server URL inside the cluster. HTTPS by default — if your
# argocd-server uses a cert chain that's not in the default system
# trust store (e.g. an internal CA), pass the trust bundle below via
# caBundle.content and kex will verify against it.
argocdServer: https://argocd-server.argocd.svc.cluster.local

# Optional CA bundle, mounted into the kex pod for outbound TLS verification
# (currently just the ArgoCD HTTP client). Two ways to provide it:
#   * Inline PEM content via caBundle.content — chart renders a ConfigMap
#     in the release namespace and mounts it. Keeps the kex container
#     image fully generic; cluster-specific roots never get baked in.
#   * Pre-existing ConfigMap via caBundle.existingConfigMap — name of a
#     ConfigMap already in the release namespace with the PEM in
#     `caBundle.configMapKey`.
# Leave both empty if argocdServer is plaintext / publicly-trusted.
caBundle:
  content: ""
  existingConfigMap: ""
  configMapKey: "ca-bundle.crt"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

replicaCount: 1
